<div class="min-h-screen bg-gray-100 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md mx-auto bg-white rounded-lg shadow-md p-6">
    <h2 class="text-2xl font-bold text-center text-gray-800 mb-8">Schedule Appointment</h2>
    
    <form class="space-y-6" (ngSubmit)="onSubmit()">
      <!-- Doctor Selection -->
      <div>
        <label for="doctor" class="block text-sm font-medium text-gray-700 mb-1">Select Doctor</label>
        <select
          id="doctor"
          [(ngModel)]="selectedDoctor"
          name="doctor"
          required
          class="mt-1 block w-full px-3 py-2 text-base border border-gray-300 bg-white rounded-md shadow-sm focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 text-gray-900"
        >
          <option value="" class="text-gray-500">Select a doctor</option>
          <option *ngFor="let doctor of doctors" [value]="doctor.id" class="text-gray-900 bg-white">
            {{ doctor.name }}
          </option>
        </select>
      </div>

      <!-- Date Selection -->
      <div>
        <label for="date" class="block text-sm font-medium text-gray-700 mb-1">Select Date</label>
        <input
          type="date"
          id="date"
          [(ngModel)]="selectedDate"
          name="date"
          required
          class="mt-1 block w-full px-3 py-2 text-base border border-gray-300 bg-white rounded-md shadow-sm focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 text-gray-900"
        />
      </div>

      <!-- Buttons -->
      <div class="flex justify-end space-x-4 mt-6">
        <button
          type="button"
          (click)="onCancel()"
          class="px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500"
        >
          Cancel
        </button>
        <button
          type="submit"
          (click)="checkDoctorAvailability()"
          [disabled]="!selectedDoctor || !selectedDate"
          class="px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50 disabled:cursor-not-allowed"
        >
          Next
        </button>
      </div>
    </form>
  </div>
</div>
